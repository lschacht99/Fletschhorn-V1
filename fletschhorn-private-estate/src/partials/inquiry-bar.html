<form class="fh-inquiry-bar" data-fh-inquiry-form>
  <div class="fh-inquiry-field"><label for="stay-type">Stay type</label><select id="stay-type" name="stayType"><option>Private stay</option><option>Wedding</option><option>Retreat</option><option>Corporate</option><option>Family gathering</option></select></div>
  <div class="fh-inquiry-field"><label for="occasion">Occasion</label><input id="occasion" name="occasion" placeholder="Wedding weekend, retreat…"></div>
  <div class="fh-inquiry-field"><label for="guests">Guests</label><input id="guests" name="guests" inputmode="numeric" placeholder="Up to 67 by arrangement"></div>
  <div class="fh-inquiry-field"><label for="dates">Preferred dates</label><input id="dates" name="dates" placeholder="Season or dates"></div>
  <button class="fh-cta" type="submit">Request Availability</button>
</form>

<form class="fh-inquiry-bar" data-fh-inquiry-form>
  <div class="fh-inquiry-field"><label for="stay-type" data-i18n="home.inquiryStay">Stay type</label><select id="stay-type" name="stayType"><option data-i18n="booking.privateStay">Private stay</option><option data-i18n="booking.wedding">Wedding</option><option data-i18n="booking.retreat">Retreat</option><option data-i18n="booking.corporate">Corporate</option><option data-i18n="booking.family">Family gathering</option></select></div>
  <div class="fh-inquiry-field"><label for="occasion" data-i18n="home.inquiryOccasion">Occasion</label><input id="occasion" name="occasion" data-i18n-placeholder="home.inquiryOccasionPlaceholder" placeholder="Wedding weekend, retreat…"></div>
  <div class="fh-inquiry-field"><label for="guests" data-i18n="home.inquiryGuests">Guests</label><input id="guests" name="guests" inputmode="numeric" data-i18n-placeholder="home.inquiryGuestsPlaceholder" placeholder="Up to 67 by arrangement"></div>
  <div class="fh-inquiry-field"><label for="dates" data-i18n="home.inquiryDates">Preferred dates</label><input id="dates" name="dates" data-i18n-placeholder="home.inquiryDatesPlaceholder" placeholder="Season or dates"></div>
  <button class="fh-cta" type="submit" data-i18n="common.request">Request Availability</button>
</form>
